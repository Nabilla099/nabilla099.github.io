<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"/>
  <title>🌸 NabillaKH - J2ME Editor</title>
  
  <style>
    /* ============================================================
       CSS VARIABLES - THEMES
       ============================================================ */
    :root {
      /* Default Pink Theme */
      --bg-primary: #f8f0f5;
      --bg-secondary: #fce4ec;
      --bg-card: rgba(255,255,255,0.85);
      --bg-glass: rgba(255,255,255,0.92);
      --text-primary: #1a0f1a;
      --text-secondary: #c2185b;
      --text-muted: #8a6a7a;
      --accent-start: #ec407a;
      --accent-end: #ad1457;
      --accent-glow: rgba(236,64,122,0.25);
      --border-color: rgba(194,24,91,0.08);
      --shadow-color: rgba(194,24,91,0.06);
      --shadow-strong: rgba(194,24,91,0.12);
      --header-bg: linear-gradient(135deg, #ec407a, #ad1457);
      --header-text: #ffffff;
      --input-bg: rgba(255,255,255,0.9);
      --toast-bg: #ad1457;
      --scrollbar-track: rgba(194,24,91,0.04);
      --scrollbar-thumb: linear-gradient(135deg, #ec407a, #ad1457);
      --nav-bg: rgba(255,255,255,0.92);
      --badge-bg: linear-gradient(135deg, #ec407a, #ad1457);
      --card-shadow: 0 4px 20px rgba(194,24,91,0.06);
      --card-hover: 0 8px 32px rgba(194,24,91,0.12);
      --btn-primary: linear-gradient(135deg, #ec407a, #ad1457);
      --btn-shadow: 0 4px 16px rgba(236,64,122,0.25);
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-primary: #0a0a14;
      --bg-secondary: #14142a;
      --bg-card: rgba(20,20,42,0.85);
      --bg-glass: rgba(20,20,42,0.92);
      --text-primary: #f0e6ef;
      --text-secondary: #f06292;
      --text-muted: #8a7a8a;
      --accent-start: #e91e63;
      --accent-end: #880e4f;
      --accent-glow: rgba(233,30,99,0.2);
      --border-color: rgba(233,30,99,0.1);
      --shadow-color: rgba(0,0,0,0.3);
      --shadow-strong: rgba(0,0,0,0.4);
      --header-bg: linear-gradient(135deg, #1a1a2e, #0a0a14);
      --header-text: #f06292;
      --input-bg: rgba(26,26,46,0.8);
      --toast-bg: #880e4f;
      --scrollbar-track: rgba(233,30,99,0.04);
      --scrollbar-thumb: linear-gradient(135deg, #e91e63, #880e4f);
      --nav-bg: rgba(20,20,42,0.92);
      --badge-bg: linear-gradient(135deg, #e91e63, #880e4f);
      --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
      --card-hover: 0 8px 32px rgba(0,0,0,0.4);
      --btn-primary: linear-gradient(135deg, #e91e63, #880e4f);
      --btn-shadow: 0 4px 16px rgba(233,30,99,0.2);
    }

    /* Sakura Theme */
    [data-theme="sakura"] {
      --bg-primary: #fdf6f9;
      --bg-secondary: #fce4ec;
      --bg-card: rgba(255,255,255,0.88);
      --bg-glass: rgba(255,255,255,0.94);
      --text-primary: #3a1a2a;
      --text-secondary: #d63384;
      --text-muted: #9a7a8a;
      --accent-start: #f06292;
      --accent-end: #c2185b;
      --accent-glow: rgba(240,98,146,0.2);
      --border-color: rgba(214,51,132,0.06);
      --shadow-color: rgba(214,51,132,0.04);
      --shadow-strong: rgba(214,51,132,0.1);
      --header-bg: linear-gradient(135deg, #f8bbd0, #d63384);
      --header-text: #ffffff;
      --input-bg: rgba(255,255,255,0.9);
      --toast-bg: #d63384;
      --scrollbar-track: rgba(214,51,132,0.04);
      --scrollbar-thumb: linear-gradient(135deg, #f06292, #d63384);
      --nav-bg: rgba(255,255,255,0.92);
      --badge-bg: linear-gradient(135deg, #f06292, #d63384);
      --card-shadow: 0 4px 20px rgba(214,51,132,0.04);
      --card-hover: 0 8px 32px rgba(214,51,132,0.08);
      --btn-primary: linear-gradient(135deg, #f06292, #d63384);
      --btn-shadow: 0 4px 16px rgba(214,51,132,0.2);
    }

    /* Pastel Theme */
    [data-theme="pastel"] {
      --bg-primary: #f5f8ff;
      --bg-secondary: #e8f0fe;
      --bg-card: rgba(255,255,255,0.88);
      --bg-glass: rgba(255,255,255,0.94);
      --text-primary: #1a2a4a;
      --text-secondary: #5c6bc0;
      --text-muted: #7a8aaa;
      --accent-start: #7986cb;
      --accent-end: #3949ab;
      --accent-glow: rgba(92,107,192,0.15);
      --border-color: rgba(92,107,192,0.06);
      --shadow-color: rgba(92,107,192,0.04);
      --shadow-strong: rgba(92,107,192,0.1);
      --header-bg: linear-gradient(135deg, #7986cb, #3949ab);
      --header-text: #ffffff;
      --input-bg: rgba(255,255,255,0.9);
      --toast-bg: #3949ab;
      --scrollbar-track: rgba(92,107,192,0.04);
      --scrollbar-thumb: linear-gradient(135deg, #7986cb, #3949ab);
      --nav-bg: rgba(255,255,255,0.92);
      --badge-bg: linear-gradient(135deg, #7986cb, #3949ab);
      --card-shadow: 0 4px 20px rgba(92,107,192,0.04);
      --card-hover: 0 8px 32px rgba(92,107,192,0.08);
      --btn-primary: linear-gradient(135deg, #7986cb, #3949ab);
      --btn-shadow: 0 4px 16px rgba(92,107,192,0.2);
    }

    /* ============================================================
       RESET & BASE - OPTIMIZED FOR LOW-END
       ============================================================ */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    
    body{
      font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
      margin:0;
      background:var(--bg-primary);
      color:var(--text-primary);
      padding-bottom:80px;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      transition:background 0.3s,color 0.3s;
      min-height:100vh;
      position:relative;
      will-change:background;
    }

    /* ============================================================
       UNIQUE LOADING - MODERN CIRCLE PULSE
       ============================================================ */
    .load-overlay {
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index:500;
      display:none;
      align-items:center;
      justify-content:center;
      opacity:0;
      transition:opacity 0.4s ease;
    }
    .load-overlay.active{
      display:flex;
      opacity:1;
    }
    
    .load-box {
      background:var(--bg-glass);
      padding:32px 40px;
      border-radius:24px;
      text-align:center;
      border:1px solid var(--border-color);
      box-shadow:0 12px 48px var(--shadow-strong);
      transform:scale(0.92);
      transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      min-width:180px;
      max-width:320px;
      width:85%;
    }
    .load-overlay.active .load-box {
      transform:scale(1);
    }
    
    /* UNIQUE LOADING SPINNER - PULSE RINGS */
    .load-spinner {
      position:relative;
      width:60px;
      height:60px;
      margin:0 auto 14px;
    }
    .load-spinner .ring {
      position:absolute;
      top:0;left:0;
      width:100%;
      height:100%;
      border-radius:50%;
      border:3px solid transparent;
      animation:spinPulse 1.4s ease-in-out infinite;
    }
    .load-spinner .ring:nth-child(1) {
      border-top-color:var(--text-secondary);
      animation-delay:0s;
    }
    .load-spinner .ring:nth-child(2) {
      border-right-color:var(--accent-start);
      animation-delay:0.3s;
      width:75%;
      height:75%;
      top:12.5%;
      left:12.5%;
    }
    .load-spinner .ring:nth-child(3) {
      border-bottom-color:var(--accent-end);
      animation-delay:0.6s;
      width:50%;
      height:50%;
      top:25%;
      left:25%;
    }
    
    @keyframes spinPulse {
      0% { transform:rotate(0deg) scale(1); opacity:1; }
      50% { transform:rotate(180deg) scale(1.1); opacity:0.6; }
      100% { transform:rotate(360deg) scale(1); opacity:1; }
    }
    
    .load-box .load-icon {
      font-size:32px;
      display:block;
      margin-bottom:6px;
    }
    .load-box .load-title {
      font-size:14px;
      font-weight:700;
      color:var(--text-primary);
      margin-bottom:2px;
    }
    .load-box .load-sub {
      font-size:11px;
      color:var(--text-muted);
      font-weight:400;
    }
    .load-box .load-progress {
      width:100%;
      height:3px;
      background:var(--border-color);
      border-radius:4px;
      margin-top:12px;
      overflow:hidden;
    }
    .load-box .load-progress .bar {
      height:100%;
      width:0%;
      background:var(--badge-bg);
      border-radius:4px;
      transition:width 0.3s ease;
    }

    /* ============================================================
       UNIQUE TOPBAR - BADGE STYLE
       ============================================================ */
    .topbar {
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:52px;
      background:var(--header-bg);
      z-index:30;
      display:flex;
      align-items:center;
      padding:0 12px;
      box-shadow:0 2px 20px var(--shadow-strong);
      transition:background 0.4s;
    }
    
    .topbar-brand {
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
    }
    .topbar-brand .brand-icon {
      width:32px;
      height:32px;
      border-radius:10px;
      background:rgba(255,255,255,0.15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      color:var(--header-text);
    }
    .topbar-brand .brand-text {
      font-size:15px;
      font-weight:700;
      color:var(--header-text);
      letter-spacing:-0.3px;
    }
    .topbar-brand .brand-text span {
      opacity:0.7;
      font-weight:400;
    }
    
    .topbar-spacer{flex:1}
    
    .topbar-actions {
      display:flex;
      gap:4px;
      align-items:center;
    }
    .topbar-actions button {
      width:34px;
      height:34px;
      border-radius:10px;
      border:none;
      background:rgba(255,255,255,0.12);
      color:var(--header-text);
      font-size:15px;
      cursor:pointer;
      transition:0.2s;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .topbar-actions button:active{transform:scale(0.9);background:rgba(255,255,255,0.25)}

    /* ============================================================
       UNIQUE SIDEBAR - SLIDE FROM BOTTOM (like bottom sheet)
       ============================================================ */
    .sidebar-overlay {
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.3);
      z-index:40;
      display:none;
      opacity:0;
      transition:opacity 0.3s ease;
    }
    .sidebar-overlay.show{display:block;opacity:1}
    
    .sidebar {
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      max-height:75vh;
      background:var(--bg-glass);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      z-index:50;
      border-radius:24px 24px 0 0;
      padding:16px 16px 30px;
      transform:translateY(100%);
      transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow:0 -8px 40px var(--shadow-strong);
      border-top:1px solid var(--border-color);
      overflow-y:auto;
    }
    .sidebar.open{transform:translateY(0)}
    
    .sidebar-handle {
      width:40px;
      height:4px;
      border-radius:4px;
      background:var(--border-color);
      margin:0 auto 14px;
      opacity:0.5;
    }
    
    .sidebar-brand {
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:12px;
      border-bottom:1px solid var(--border-color);
      margin-bottom:12px;
    }
    .sidebar-brand .brand-icon {
      width:36px;
      height:36px;
      border-radius:12px;
      background:var(--badge-bg);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      color:#fff;
      box-shadow:0 4px 16px var(--accent-glow);
    }
    .sidebar-brand .brand-text {
      font-size:16px;
      font-weight:700;
      color:var(--text-primary);
    }
    .sidebar-brand .brand-text span {
      color:var(--text-secondary);
    }
    
    .sidebar-item {
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      transition:0.2s;
      color:var(--text-primary);
      font-size:13px;
      font-weight:500;
      background:transparent;
      border:none;
      width:100%;
      font-family:inherit;
      text-align:left;
    }
    .sidebar-item:active{transform:scale(0.97);background:var(--bg-secondary)}
    .sidebar-item .icon{font-size:18px;width:28px;text-align:center}
    .sidebar-item.active{background:var(--badge-bg);color:#fff;box-shadow:0 4px 16px var(--accent-glow)}

    /* ============================================================
       UNIQUE HEADER - EXPANDABLE CHIP
       ============================================================ */
    .header-chip {
      position:fixed;
      top:58px;
      left:12px;
      right:12px;
      z-index:20;
      background:var(--bg-glass);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-radius:16px;
      border:1px solid var(--border-color);
      box-shadow:0 4px 24px var(--shadow-color);
      padding:12px 14px;
      max-height:380px;
      overflow:hidden;
      transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .header-chip.collapsed {
      max-height:0;
      padding:0 14px;
      opacity:0;
      transform:translateY(-8px);
      pointer-events:none;
    }
    body.header-collapsed{padding-top:58px}
    body:not(.header-collapsed){padding-top:170px}

    /* ============================================================
       UNIQUE BUTTON - NEOBRUTALISM STYLE
       ============================================================ */
    .btn-neo {
      padding:6px 14px;
      border-radius:10px;
      border:2px solid var(--text-primary);
      background:var(--bg-card);
      color:var(--text-primary);
      font-size:11px;
      font-weight:700;
      cursor:pointer;
      font-family:inherit;
      transition:0.15s;
      box-shadow:3px 3px 0 var(--text-primary);
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:4px;
    }
    .btn-neo:active {
      transform:translate(3px,3px);
      box-shadow:0px 0px 0 var(--text-primary);
    }
    .btn-neo.primary {
      background:var(--btn-primary);
      color:#fff;
      border-color:var(--accent-end);
      box-shadow:3px 3px 0 var(--accent-end);
    }
    .btn-neo.primary:active{box-shadow:0px 0px 0 var(--accent-end)}
    .btn-neo.green{border-color:#388e3c;color:#388e3c;box-shadow:3px 3px 0 #388e3c}
    .btn-neo.green.primary{background:linear-gradient(135deg,#66bb6a,#388e3c);color:#fff;border-color:#2e7d32;box-shadow:3px 3px 0 #2e7d32}
    .btn-neo.green.primary:active{box-shadow:0px 0px 0 #2e7d32}
    .btn-neo.orange{border-color:#ef6c00;color:#ef6c00;box-shadow:3px 3px 0 #ef6c00}
    .btn-neo.orange.primary{background:linear-gradient(135deg,#ffa726,#ef6c00);color:#fff;border-color:#e65100;box-shadow:3px 3px 0 #e65100}
    .btn-neo.orange.primary:active{box-shadow:0px 0px 0 #e65100}
    .btn-neo.purple{border-color:#6a1b9a;color:#6a1b9a;box-shadow:3px 3px 0 #6a1b9a}
    .btn-neo.purple.primary{background:linear-gradient(135deg,#ab47bc,#6a1b9a);color:#fff;border-color:#4a148c;box-shadow:3px 3px 0 #4a148c}
    .btn-neo.purple.primary:active{box-shadow:0px 0px 0 #4a148c}
    .btn-neo.small{padding:3px 10px;font-size:10px}
    .btn-neo:disabled{opacity:0.4;transform:none!important;box-shadow:none!important;cursor:not-allowed}

    /* ============================================================
       UNIQUE SAVE BUTTON - FLOATING NEO
       ============================================================ */
    #saveBtn {
      position:fixed;
      bottom:14px;
      left:14px;
      padding:10px 22px;
      border-radius:14px;
      border:3px solid var(--accent-end);
      background:var(--btn-primary);
      color:#fff;
      font-size:12px;
      font-weight:800;
      font-family:inherit;
      cursor:pointer;
      box-shadow:5px 5px 0 var(--accent-end);
      transition:0.15s;
      z-index:35;
      display:none;
      letter-spacing:0.5px;
      text-transform:uppercase;
    }
    #saveBtn:active {
      transform:translate(5px,5px);
      box-shadow:0px 0px 0 var(--accent-end);
    }
    #saveBtn:disabled{opacity:0.4;transform:none!important;box-shadow:5px 5px 0 var(--accent-end)!important;cursor:not-allowed}

    /* ============================================================
       UNIQUE NAV DOCK - CIRCULAR
       ============================================================ */
    .nav-ring {
      position:fixed;
      bottom:80px;
      left:50%;
      transform:translateX(-50%) translateY(0);
      z-index:40;
      background:var(--bg-glass);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      padding:6px 16px;
      border-radius:30px;
      border:1px solid var(--border-color);
      box-shadow:0 8px 32px var(--shadow-strong);
      display:flex;
      align-items:center;
      gap:6px;
      transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      user-select:none;
      touch-action:none;
    }
    .nav-ring.hidden {
      opacity:0;
      transform:translateX(-50%) translateY(20px) scale(0.92);
      pointer-events:none;
    }
    .nav-ring .drag-dot {
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--text-muted);
      opacity:0.3;
      margin-right:4px;
      cursor:grab;
    }
    .nav-ring .drag-dot:active{cursor:grabbing}
    .nav-ring button {
      width:30px;
      height:30px;
      border-radius:50%;
      border:2px solid var(--border-color);
      background:transparent;
      color:var(--text-primary);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:inherit;
    }
    .nav-ring button:active:not(:disabled){transform:scale(0.85);background:var(--bg-secondary)}
    .nav-ring button:disabled{opacity:0.2;cursor:not-allowed}
    .nav-ring button.primary{background:var(--badge-bg);color:#fff;border-color:transparent}
    .nav-ring .nav-counter {
      font-size:10px;
      font-weight:700;
      color:var(--text-primary);
      min-width:40px;
      text-align:center;
      font-variant-numeric:tabular-nums;
    }
    .nav-ring .nav-fname {
      font-size:9px;
      color:var(--text-muted);
      max-width:80px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-weight:500;
    }
    .nav-ring .nav-close {
      width:24px;
      height:24px;
      border-radius:50%;
      border:1px solid var(--border-color);
      background:transparent;
      color:var(--text-muted);
      font-size:11px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:0.3s;
      font-family:inherit;
    }
    .nav-ring .nav-close:active{transform:rotate(90deg) scale(0.85);background:var(--bg-secondary)}

    #showNavBtn {
      position:fixed;
      bottom:80px;
      left:50%;
      transform:translateX(-50%) scale(0.85);
      z-index:39;
      background:var(--badge-bg);
      color:#fff;
      border:3px solid var(--accent-end);
      border-radius:30px;
      padding:8px 22px;
      font-size:11px;
      font-weight:800;
      cursor:pointer;
      box-shadow:4px 4px 0 var(--accent-end);
      opacity:0;
      pointer-events:none;
      transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      font-family:inherit;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }
    #showNavBtn.visible {
      opacity:1;
      pointer-events:auto;
      transform:translateX(-50%) scale(1);
    }
    #showNavBtn:active {
      transform:translateX(-50%) translate(4px,4px) scale(0.95);
      box-shadow:0px 0px 0 var(--accent-end);
    }

    /* ============================================================
       UNIQUE FILE CARDS - DIAGONAL STYLE
       ============================================================ */
    .file-list {
      padding:0 12px;
      max-width:900px;
      margin:0 auto;
    }

    .file-card {
      background:var(--bg-card);
      border:1px solid var(--border-color);
      border-radius:12px;
      padding:10px 12px;
      margin:5px 0;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
      transition:0.2s;
      box-shadow:var(--card-shadow);
      position:relative;
      overflow:hidden;
    }
    .file-card::after {
      content:'';
      position:absolute;
      top:0;
      right:0;
      width:40px;
      height:40px;
      background:var(--badge-bg);
      opacity:0.04;
      border-radius:0 0 0 40px;
    }
    .file-card:active{transform:scale(0.99)}
    .file-card .idx {
      font-weight:700;
      font-size:10px;
      color:var(--text-muted);
      min-width:24px;
      text-align:center;
    }
    .file-card .txt {
      flex:1;
      word-break:break-all;
      font-size:12px;
      color:var(--text-primary);
      line-height:1.4;
    }
    .file-card .tag {
      font-size:8px;
      padding:2px 10px;
      border-radius:20px;
      font-weight:700;
      background:var(--bg-secondary);
      color:var(--text-secondary);
      white-space:nowrap;
      text-transform:uppercase;
      letter-spacing:0.3px;
    }
    .file-card .tag.over{background:#ffebee;color:#e53935}
    .file-card .act {
      display:flex;
      gap:3px;
    }
    .file-card .act button {
      width:26px;
      height:26px;
      border-radius:8px;
      border:1px solid var(--border-color);
      background:transparent;
      color:var(--text-muted);
      font-size:11px;
      cursor:pointer;
      transition:0.2s;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .file-card .act button:active{transform:scale(0.85);background:var(--bg-secondary)}
    
    .file-card .edit-area{display:none;width:100%;margin-top:4px}
    .file-card .edit-area textarea{
      width:100%;
      min-height:40px;
      border:2px solid var(--border-color);
      border-radius:10px;
      padding:6px 8px;
      font-family:inherit;
      font-size:11px;
      background:var(--input-bg);
      color:var(--text-primary);
      resize:vertical;
      outline:none;
      transition:0.2s;
    }
    .file-card .edit-area textarea:focus{border-color:var(--text-secondary)}
    .file-card .edit-area .edit-btns{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
    .file-card .edit-area .edit-btns button{
      padding:2px 10px;
      border-radius:8px;
      border:2px solid var(--accent-end);
      font-size:9px;
      font-weight:700;
      cursor:pointer;
      font-family:inherit;
      background:var(--btn-primary);
      color:#fff;
      transition:0.15s;
      box-shadow:2px 2px 0 var(--accent-end);
    }
    .file-card .edit-area .edit-btns button:active{transform:translate(2px,2px);box-shadow:0px 0px 0 var(--accent-end)}
    .file-card .edit-area .edit-btns button.cancel{background:var(--bg-secondary);color:var(--text-muted);border-color:var(--border-color);box-shadow:2px 2px 0 var(--border-color)}
    .file-card .edit-area .edit-btns button.split{background:linear-gradient(135deg,#ffa726,#ef6c00);border-color:#e65100;box-shadow:2px 2px 0 #e65100}
    .file-card.editing .txt{display:none}
    .file-card.editing .tag{display:none}
    .file-card.editing .edit-area{display:block}

    /* ============================================================
       UNIQUE FINDER
       ============================================================ */
    .finder-wrap{padding:0 12px;max-width:900px;margin:0 auto}
    .finder-stat{
      font-size:11px;
      color:var(--text-muted);
      padding:6px 12px;
      background:var(--bg-secondary);
      border-radius:10px;
      margin-bottom:6px;
      border:1px solid var(--border-color);
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      font-weight:500;
    }
    .finder-result{
      background:var(--bg-card);
      border:1px solid var(--border-color);
      border-radius:12px;
      padding:10px 12px;
      margin:4px 0;
      cursor:pointer;
      transition:0.2s;
      box-shadow:var(--card-shadow);
    }
    .finder-result:active{transform:scale(0.99)}
    .finder-result .fr-head{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      font-weight:600;
      font-size:12px;
      color:var(--text-primary);
    }
    .finder-result .fr-head .fc{
      font-size:8px;
      background:var(--badge-bg);
      color:#fff;
      padding:1px 10px;
      border-radius:20px;
      font-weight:700;
    }
    .finder-result .fr-preview{
      font-size:10px;
      color:var(--text-muted);
      margin-top:3px;
      padding:3px 8px;
      border-left:2px solid var(--text-secondary);
      background:var(--bg-secondary);
      border-radius:4px;
      word-break:break-all;
    }

    /* ============================================================
       UNIQUE TOAST - SNAPBAR
       ============================================================ */
    .toast {
      position:fixed;
      bottom:160px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      padding:8px 20px;
      border-radius:30px;
      font-size:11px;
      font-weight:600;
      z-index:60;
      display:none;
      max-width:90%;
      text-align:center;
      font-family:inherit;
      background:var(--toast-bg);
      color:#fff;
      box-shadow:0 4px 24px var(--shadow-strong);
      border:2px solid rgba(255,255,255,0.1);
      transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      letter-spacing:0.3px;
    }
    .toast.show{display:block;transform:translateX(-50%) translateY(0)}
    .toast.warn{background:linear-gradient(135deg,#f57c00,#e65100)}
    .toast.success{background:linear-gradient(135deg,#43a047,#2e7d32)}

    /* ============================================================
       UNIQUE POPUP
       ============================================================ */
    .popup-overlay {
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.3);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index:100;
      display:none;
      align-items:center;
      justify-content:center;
    }
    .popup-overlay.active{display:flex}
    .popup-box {
      background:var(--bg-card);
      border-radius:20px;
      padding:24px 28px;
      max-width:320px;
      width:90%;
      border:2px solid var(--border-color);
      box-shadow:0 12px 48px var(--shadow-strong);
      text-align:center;
      animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn{from{transform:scale(0.9) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .popup-box .popup-icon{font-size:36px;display:block;margin-bottom:4px}
    .popup-box h3{font-size:15px;color:var(--text-primary);margin-bottom:4px}
    .popup-box p{font-size:11px;color:var(--text-muted);margin-bottom:14px;line-height:1.5}
    .popup-box .popup-btns{display:flex;gap:10px;justify-content:center}
    .popup-box .popup-btns button{
      padding:7px 20px;
      border-radius:12px;
      border:2px solid var(--border-color);
      font-size:11px;
      font-weight:700;
      cursor:pointer;
      font-family:inherit;
      transition:0.2s;
      background:var(--bg-secondary);
      color:var(--text-muted);
    }
    .popup-box .popup-btns button:active{transform:scale(0.95)}
    .popup-box .popup-btns .primary{background:var(--badge-bg);color:#fff;border-color:var(--accent-end)}

    /* ============================================================
       UNIQUE STATS CHIPS
       ============================================================ */
    .stats-row {
      display:flex;
      gap:4px;
      flex-wrap:wrap;
      margin-top:6px;
    }
    .stat-chip {
      padding:2px 10px;
      border-radius:20px;
      font-size:8px;
      font-weight:700;
      background:var(--bg-secondary);
      color:var(--text-secondary);
      border:1px solid var(--border-color);
      display:flex;
      align-items:center;
      gap:3px;
      text-transform:uppercase;
      letter-spacing:0.3px;
    }
    .stat-chip .num{color:var(--text-primary)}

    /* ============================================================
       UNIQUE IMAGE PREVIEW
       ============================================================ */
    .img-preview {
      display:none;
      padding:12px;
      text-align:center;
      background:var(--bg-card);
      border-radius:12px;
      margin:6px 12px;
      border:1px solid var(--border-color);
      box-shadow:var(--card-shadow);
    }
    .img-preview img {
      max-width:100%;
      max-height:300px;
      border-radius:10px;
      display:block;
      margin:0 auto;
    }
    .img-preview .img-info{font-size:9px;color:var(--text-muted);margin-top:6px}

    /* ============================================================
       UNIQUE SCROLL BUTTONS
       ============================================================ */
    .scroll-btns {
      position:fixed;
      bottom:150px;
      right:8px;
      display:flex;
      flex-direction:column;
      gap:3px;
      z-index:30;
    }
    .scroll-btns button {
      width:32px;
      height:32px;
      border-radius:50%;
      border:2px solid var(--border-color);
      background:var(--bg-glass);
      color:var(--text-secondary);
      font-size:14px;
      cursor:pointer;
      transition:0.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:inherit;
      font-weight:700;
      box-shadow:0 2px 12px var(--shadow-color);
    }
    .scroll-btns button:active{transform:scale(0.85)}

    /* ============================================================
       UNIQUE UNDO INDICATOR
       ============================================================ */
    .undo-chip {
      position:fixed;
      bottom:60px;
      left:50%;
      transform:translateX(-50%);
      background:var(--bg-glass);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      padding:3px 16px;
      border-radius:30px;
      font-size:8px;
      color:var(--text-secondary);
      border:1px solid var(--border-color);
      z-index:35;
      opacity:0;
      transition:0.4s;
      pointer-events:none;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }
    .undo-chip.show{opacity:1;pointer-events:auto}

    /* ============================================================
       UNIQUE FILE BROWSER IN SIDEBAR
       ============================================================ */
    .file-browser{max-height:200px;overflow-y:auto;margin-top:6px}
    .file-browser .folder{
      font-weight:600;
      padding:4px 10px;
      border-radius:8px;
      margin:2px 0;
      border-left:2px solid var(--text-secondary);
      cursor:pointer;
      font-size:10px;
      color:var(--text-primary);
      background:var(--bg-secondary);
      transition:0.2s;
    }
    .file-browser .folder:active{background:var(--border-color)}
    .file-browser .folder .icon{margin-right:4px}
    .file-browser .file-entry{
      padding:2px 8px 2px 18px;
      font-size:9px;
      border-bottom:1px solid var(--border-color);
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:var(--text-primary);
      transition:0.2s;
    }
    .file-browser .file-entry:active{background:var(--bg-secondary)}
    .file-browser .file-entry .size{font-size:7px;color:var(--text-muted)}
    .file-browser .file-entry .icon{margin-right:3px}
    .file-browser .folder-content{display:none;padding-left:10px}
    .file-browser .folder-content.open{display:block}

    /* ============================================================
       UNIQUE SEARCH & REPLACE PANEL
       ============================================================ */
    .sr-panel {
      display:none;
      margin-top:6px;
      padding:8px 10px;
      background:var(--bg-secondary);
      border-radius:12px;
      border:1px solid var(--border-color);
    }
    .sr-panel input {
      width:100%;
      padding:5px 8px;
      border-radius:8px;
      border:2px solid var(--border-color);
      font-size:10px;
      font-family:inherit;
      background:var(--input-bg);
      color:var(--text-primary);
      outline:none;
      margin-bottom:3px;
      transition:0.2s;
    }
    .sr-panel input:focus{border-color:var(--text-secondary)}
    .sr-panel .sr-actions{display:flex;gap:3px;flex-wrap:wrap}
    .sr-panel .sr-actions button{
      padding:3px 12px;
      border-radius:8px;
      border:2px solid var(--accent-end);
      font-size:9px;
      font-weight:700;
      cursor:pointer;
      font-family:inherit;
      background:var(--btn-primary);
      color:#fff;
      transition:0.15s;
      box-shadow:2px 2px 0 var(--accent-end);
    }
    .sr-panel .sr-actions button:active{transform:translate(2px,2px);box-shadow:0px 0px 0 var(--accent-end)}
    .sr-panel .sr-actions button.outline{background:transparent;color:var(--text-secondary);border-color:var(--border-color);box-shadow:2px 2px 0 var(--border-color)}
    .sr-panel .sr-stats{font-size:8px;color:var(--text-muted);margin-top:3px;font-weight:500}

    /* ============================================================
       UNIQUE MODE TABS
       ============================================================ */
    .mode-tabs{display:flex;gap:3px;margin-top:4px}
    .mode-tab{
      padding:2px 12px;
      border-radius:20px;
      font-size:9px;
      font-weight:700;
      cursor:pointer;
      border:2px solid var(--border-color);
      background:transparent;
      color:var(--text-muted);
      font-family:inherit;
      transition:0.2s;
      text-transform:uppercase;
      letter-spacing:0.3px;
    }
    .mode-tab:active{transform:scale(0.95)}
    .mode-tab.active{
      background:var(--badge-bg);
      color:#fff;
      border-color:transparent;
    }

    /* ============================================================
       SCROLLBAR
       ============================================================ */
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--scrollbar-track)}
    ::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width:600px){
      .topbar{height:46px;padding:0 10px}
      .topbar-brand .brand-text{font-size:13px}
      .header-chip{top:52px;left:8px;right:8px;padding:10px 12px}
      body:not(.header-collapsed){padding-top:155px}
      .nav-ring{padding:4px 12px;gap:4px;border-radius:24px}
      .nav-ring button{width:26px;height:26px;font-size:10px}
      .nav-ring .nav-counter{min-width:32px;font-size:9px}
      .nav-ring .nav-fname{max-width:55px;font-size:8px}
      .nav-ring .nav-close{width:20px;height:20px;font-size:9px}
      .file-card{padding:8px 10px;gap:6px}
      .file-card .txt{font-size:11px}
      .sidebar{padding:12px 12px 20px}
      .toast{bottom:140px;font-size:10px;padding:6px 16px}
      #saveBtn{padding:8px 16px;font-size:11px}
      .load-box{padding:24px 28px}
      .load-spinner{width:48px;height:48px}
      .orb{display:none}
    }
  </style>
</head>
<body>

<!-- ===== UNIQUE LOADING ===== -->
<div class="load-overlay" id="loadOverlay">
  <div class="load-box">
    <span class="load-icon" id="loadIcon">🌸</span>
    <div class="load-title" id="loadTitle">Memproses...</div>
    <div class="load-sub" id="loadSub">Mohon tunggu sebentar</div>
    <div class="load-spinner">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <div class="load-progress">
      <div class="bar" id="loadBar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- ===== OVERLAY ===== -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ===== SIDEBAR (Bottom Sheet) ===== -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-handle"></div>
  
  <div class="sidebar-brand">
    <div class="brand-icon">🌸</div>
    <div class="brand-text">Nabilla<span>KH</span></div>
  </div>
  
  <button class="sidebar-item active" onclick="openExtract()"><span class="icon">📦</span> Ekstrak JAR/ZIP</button>
  <button class="sidebar-item" onclick="openFinder()"><span class="icon">🔍</span> Finder Text</button>
  <button class="sidebar-item" onclick="document.getElementById('fileInput').click()"><span class="icon">📂</span> Buka File</button>
  <button class="sidebar-item" onclick="toggleHeader()"><span class="icon">⚙️</span> Toggle Header</button>
  <button class="sidebar-item" onclick="toggleTheme()"><span class="icon">🎨</span> Ganti Tema</button>
  <button class="sidebar-item" onclick="showStats()"><span class="icon">📊</span> Statistik</button>
  
  <div id="fileBrowser" class="file-browser" style="display:none;">
    <div style="font-size:9px;font-weight:600;margin-bottom:4px;color:var(--text-muted)">📁 File dalam archive:</div>
    <div id="fileList"></div>
  </div>
</div>

<!-- ===== TOPBAR ===== -->
<div class="topbar">
  <div class="topbar-brand" onclick="toggleSidebar()">
    <div class="brand-icon">🌸</div>
    <div class="brand-text">Nabilla<span>KH</span></div>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <button onclick="toggleTheme()" title="Ganti Tema">🎨</button>
    <button onclick="openFinder()" title="Finder">🔍</button>
    <button onclick="openExtract()" title="Ekstrak">📦</button>
  </div>
</div>

<!-- ===== HEADER CHIP ===== -->
<div class="header-chip collapsed" id="headerChip">
  <div class="stats-row">
    <span class="stat-chip">📄 <span class="num" id="statFiles">0</span></span>
    <span class="stat-chip">📝 <span class="num" id="statStrings">0</span></span>
    <span class="stat-chip">💾 <span class="num" id="statSize">0</span>KB</span>
    <span class="stat-chip">✏️ <span class="num" id="statEdits">0</span></span>
    <span class="stat-chip">⏪ <span class="num" id="statUndo">0</span></span>
  </div>
  
  <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
    <label for="fileInput" class="btn-neo primary small">📂 Pilih</label>
    <button class="btn-neo green primary small" onclick="openExtract()">📦 Ekstrak</button>
    <button class="btn-neo orange primary small" onclick="openFinder()">🔍 Finder</button>
    <button class="btn-neo purple primary small" onclick="downloadJar()">⬇️ JAR</button>
    <button class="btn-neo small" onclick="toggleSR()">🔎 Cari</button>
  </div>
  <input type="file" id="fileInput" accept="*/*" style="display:none"/>
  <span id="fileNameDisplay" style="font-size:9px;color:var(--text-muted);margin-top:3px;display:block">✨ Belum ada file</span>
  
  <!-- SR Panel -->
  <div class="sr-panel" id="srPanel">
    <input type="text" id="srSearch" placeholder="🔍 Cari teks..."/>
    <input type="text" id="srReplace" placeholder="✏️ Ganti dengan..."/>
    <div class="sr-actions">
      <button onclick="srFind()">🔍 Cari</button>
      <button onclick="srReplaceOne()">✏️ Satu</button>
      <button onclick="srReplaceAll()">✏️ Semua</button>
      <button class="outline" onclick="closeSR()">✕</button>
    </div>
    <div class="sr-stats" id="srStats">0 hasil</div>
  </div>
  
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabSearch" onclick="switchMode('search')">📝 String</button>
    <button class="mode-tab" id="tabFinder" onclick="switchMode('finder')">🔍 Global</button>
  </div>
  
  <div id="searchContainer" style="display:none;margin-top:4px">
    <input type="text" id="searchInput" placeholder="🔍 Cari dalam file..." style="width:100%;padding:5px 8px;border-radius:8px;border:2px solid var(--border-color);font-size:10px;font-family:inherit;background:var(--input-bg);color:var(--text-primary);outline:none"/>
  </div>
  
  <div id="finderContainer" style="display:none;margin-top:4px">
    <input type="text" id="finderInput" placeholder="🔍 Cari di SEMUA file..." style="width:100%;padding:5px 8px;border-radius:8px;border:2px solid var(--border-color);font-size:10px;font-family:inherit;background:var(--input-bg);color:var(--text-primary);outline:none"/>
    <div style="font-size:8px;color:var(--text-muted);margin-top:2px;display:flex;justify-content:space-between;align-items:center">
      <span>💡 Cari di semua file</span>
      <span style="background:var(--badge-bg);color:#fff;padding:1px 10px;border-radius:20px;font-size:7px;font-weight:700" id="finderFileCount">0 file</span>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== UNDO CHIP ===== -->
<div class="undo-chip" id="undoChip">⏪ Undo: 1 langkah</div>

<!-- ===== IMAGE PREVIEW ===== -->
<div class="img-preview" id="imagePreview">
  <img id="previewImage" src="" alt="Preview"/>
  <div class="img-info" id="previewInfo"></div>
</div>

<!-- ===== FILE INFO ===== -->
<div id="fileInfo" style="padding:0 12px;max-width:900px;margin:0 auto"></div>

<!-- ===== TEXT LIST ===== -->
<div class="file-list" id="textList"></div>

<!-- ===== FINDER RESULTS ===== -->
<div class="finder-wrap" id="finderResults" style="display:none">
  <div class="finder-stat" id="finderStats">🔍 Cari di semua file</div>
  <div id="finderList"><div style="padding:16px;text-align:center;font-size:10px;color:var(--text-muted)">💖 Ketik kata kunci di atas</div></div>
</div>

<!-- ===== SAVE BUTTON ===== -->
<button id="saveBtn" onclick="saveFile()" style="display:none;">💾 Simpan</button>

<!-- ===== NAV RING ===== -->
<div class="nav-ring" id="navRing">
  <div class="drag-dot" id="dragDot"></div>
  <button id="prevBtn" onclick="navigateFile(-1)">◀</button>
  <span class="nav-counter" id="navCounter">0/0</span>
  <button id="nextBtn" onclick="navigateFile(1)">▶</button>
  <span class="nav-fname" id="navFname">Pilih</span>
  <button class="nav-close" onclick="hideNavRing()">✕</button>
</div>

<button id="showNavBtn" onclick="showNavRing()">🌸 Navigasi</button>

<!-- ===== SCROLL BUTTONS ===== -->
<div class="scroll-btns">
  <button id="scrollUp" onclick="scrollToTop()" style="display:none;">↑</button>
  <button id="scrollDown" onclick="scrollToBottom()" style="display:none;">↓</button>
</div>

<!-- ===== POPUP ===== -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <span class="popup-icon" id="popupIcon">🌸</span>
    <h3 id="popupTitle">Tampilkan Navigasi?</h3>
    <p id="popupDesc">Navigasi file akan muncul kembali.</p>
    <div class="popup-btns">
      <button onclick="closePopup()">Batal</button>
      <button class="primary" id="popupConfirmBtn" onclick="confirmPopup()">Ya</button>
    </div>
  </div>
</div>

<script>
// ========================================================================
// ===== JSZip CDN =====
// ========================================================================

// ========================================================================
// ===== MANUAL ZIP PARSER =====
// ========================================================================
const ManualZip = {
  loadAsync: async function(data) {
    const files = {};
    const view = new DataView(data.buffer || data);
    let eocdOffset = -1;
    const len = data.length;
    for (let i = len - 22; i >= 0 && i >= len - 65536; i--) {
      try { 
        if (view.getUint32(i, true) === 0x06054b50) { 
          eocdOffset = i; 
          break; 
        }
      } catch(e) {}
    }
    if (eocdOffset === -1) {
      for (let i = len - 22; i >= 0 && i >= len - 65536; i--) {
        try {
          if (view.getUint32(i, true) === 0x06054b50) {
            eocdOffset = i;
            break;
          }
        } catch(e) {}
      }
      if (eocdOffset === -1) throw new Error('Invalid ZIP file');
    }
    
    const centralDirOffset = view.getUint32(eocdOffset + 16, true);
    const totalEntries = view.getUint16(eocdOffset + 10, true);
    let pos = centralDirOffset;
    
    for (let i = 0; i < totalEntries; i++) {
      try {
        const signature = view.getUint32(pos, true);
        if (signature !== 0x02014b50) break;
        
        const compressionMethod = view.getUint16(pos + 10, true);
        const uncompressedSize = view.getUint32(pos + 24, true);
        const compressedSize = view.getUint32(pos + 20, true);
        const fileNameLength = view.getUint16(pos + 28, true);
        const extraFieldLength = view.getUint16(pos + 30, true);
        const commentLength = view.getUint16(pos + 32, true);
        const localHeaderOffset = view.getUint32(pos + 42, true);
        
        let fileName = '';
        for (let j = 0; j < fileNameLength; j++) {
          fileName += String.fromCharCode(view.getUint8(pos + 46 + j));
        }
        
        const localPos = localHeaderOffset;
        const localSignature = view.getUint32(localPos, true);
        if (localSignature !== 0x04034b50) {
          pos += 46 + fileNameLength + extraFieldLength + commentLength;
          continue;
        }
        
        const dataStart = localPos + 30 + fileNameLength + extraFieldLength;
        let content;
        
        if (compressionMethod === 0) {
          content = new Uint8Array(data.slice(dataStart, dataStart + uncompressedSize));
        } else if (compressionMethod === 8) {
          const compData = data.slice(dataStart, dataStart + compressedSize);
          content = new Uint8Array(compData);
          content._compressed = true;
          content._uncompressedSize = uncompressedSize;
        } else {
          content = new Uint8Array(0);
        }
        
        files[fileName] = {
          dir: fileName.endsWith('/'),
          async: async function(type) {
            if (type === 'uint8array') {
              if (this._compressed && typeof JSZip !== 'undefined' && JSZip.loadAsync) {
                try {
                  const zip = await JSZip.loadAsync(data);
                  const entry = zip.files[fileName];
                  if (entry) return await entry.async('uint8array');
                } catch(e) {}
              }
              return content;
            }
            if (type === 'string') { 
              try { 
                return new TextDecoder('utf-8').decode(content); 
              } catch(e) { 
                try { return new TextDecoder('latin1').decode(content); } catch(e2) { return ''; }
              }
            }
            return content;
          }
        };
        files[fileName]._compressed = (compressionMethod === 8);
        files[fileName]._uncompressedSize = uncompressedSize;
        
        pos += 46 + fileNameLength + extraFieldLength + commentLength;
      } catch(e) { 
        pos++; 
      }
    }
    return { files: files };
  }
};

async function extractZip(data) {
  if (typeof JSZip !== 'undefined' && JSZip.loadAsync) {
    try { 
      const zip = await JSZip.loadAsync(data);
      const firstFile = Object.keys(zip.files)[0];
      if (firstFile) {
        try {
          await zip.files[firstFile].async('uint8array');
          return zip;
        } catch(e) {}
      }
      return zip;
    } catch(e) { 
      console.log('💖 JSZip failed, using manual parser', e);
    }
  }
  return await ManualZip.loadAsync(data);
}

function showLoading(show, title='Memproses...', sub='Mohon tunggu sebentar', icon='🌸') {
  const overlay = document.getElementById('loadOverlay');
  const titleEl = document.getElementById('loadTitle');
  const subEl = document.getElementById('loadSub');
  const iconEl = document.getElementById('loadIcon');
  const bar = document.getElementById('loadBar');
  
  if (show) {
    iconEl.textContent = icon;
    titleEl.textContent = title;
    subEl.textContent = sub;
    bar.style.width = '0%';
    overlay.classList.add('active');
    loadProgress = 0;
    
    // Animate progress bar
    if (loadInterval) clearInterval(loadInterval);
    loadInterval = setInterval(() => {
      loadProgress += Math.random() * 8 + 2;
      if (loadProgress > 90) loadProgress = 90;
      bar.style.width = Math.min(loadProgress, 90) + '%';
    }, 200);
  } else {
    bar.style.width = '100%';
    setTimeout(() => {
      overlay.classList.remove('active');
      if (loadInterval) clearInterval(loadInterval);
      loadInterval = null;
    }, 400);
  }
}

function updateLoadingProgress(percent) {
  const bar = document.getElementById('loadBar');
  loadProgress = Math.min(percent, 95);
  bar.style.width = loadProgress + '%';
}

function updateLoadingText(title, sub) {
  document.getElementById('loadTitle').textContent = title;
  document.getElementById('loadSub').textContent = sub;
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  let index = themes.indexOf(current || 'default');
  index = (index + 1) % themes.length;
  const newTheme = themes[index];
  
  if (newTheme === 'default') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', newTheme);
  }
  
  currentTheme = newTheme;
  showToast('🎨 ' + newTheme.charAt(0).toUpperCase() + newTheme.slice(1), false, true);
  localStorage.setItem('nabilla-theme', newTheme);
}

function loadTheme() {
  const saved = localStorage.getItem('nabilla-theme');
  if (saved && saved !== 'default') {
    document.documentElement.setAttribute('data-theme', saved);
    currentTheme = saved;
  }
}

// ========================================================================
// ===== UNDO / REDO =====
// ========================================================================
function saveUndoState() {
  if (!texts || texts.length === 0) return;
  const state = texts.map(t => ({ text: t.text, len: t.len }));
  undoStack.push(state);
  if (undoStack.length > maxUndo) undoStack.shift();
  redoStack = [];
  editCount++;
  updateStats();
  showUndoChip('⏪ Undo: ' + undoStack.length);
}

function undo() {
  if (undoStack.length === 0) { showToast('Tidak ada undo', true); return; }
  const currentState = texts.map(t => ({ text: t.text, len: t.len }));
  redoStack.push(currentState);
  const state = undoStack.pop();
  if (state) {
    state.forEach((s, i) => {
      if (texts[i]) { texts[i].text = s.text; texts[i].len = s.len; }
    });
    displayTextList();
    showToast('⏪ Undo', false);
    updateStats();
    showUndoChip('⏪ Undo: ' + undoStack.length);
  }
}

function redo() {
  if (redoStack.length === 0) { showToast('Tidak ada redo', true); return; }
  const currentState = texts.map(t => ({ text: t.text, len: t.len }));
  undoStack.push(currentState);
  const state = redoStack.pop();
  if (state) {
    state.forEach((s, i) => {
      if (texts[i]) { texts[i].text = s.text; texts[i].len = s.len; }
    });
    displayTextList();
    showToast('🔄 Redo', false);
    updateStats();
    showUndoChip('🔄 Redo: ' + redoStack.length);
  }
}

function showUndoChip(text) {
  const el = document.getElementById('undoChip');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2000);
}

  if (panel.style.display === 'block') document.getElementById('srSearch').focus();

function closeSR() {
  document.getElementById('srPanel').style.display = 'none';
  document.getElementById('srStats').textContent = '0 hasil';
}

function srFind() {
  const search = document.getElementById('srSearch').value;
  if (!search || search.length < 2) { showToast('Minimal 2 karakter', true); return; }
  
  srResults = [];
  srCurrentIndex = 0;
  texts.forEach((item, idx) => {
    if (item.text.toLowerCase().includes(search.toLowerCase())) {
      srResults.push({ index: idx, text: item.text });
    }
  });
  
  document.getElementById('srStats').textContent = '🔍 ' + srResults.length + ' hasil dari ' + texts.length;
  if (srResults.length > 0) {
    highlightTextItem(srResults[0].index);
    showToast('🔍 ' + srResults.length + ' hasil', false);
  } else {
    showToast('Tidak ditemukan', true);
  }
}

function srReplaceOne() {
  const search = document.getElementById('srSearch').value;
  const replace = document.getElementById('srReplace').value;
  if (!search) { showToast('Masukkan teks', true); return; }
  if (srResults.length === 0) { showToast('Cari dulu!', true); return; }
  
  for (let i = 0; i < srResults.length; i++) {
    const idx = (srCurrentIndex + i) % srResults.length;
    const item = texts[srResults[idx].index];
    if (item && item.text.toLowerCase().includes(search.toLowerCase())) {
      const newText = item.text.replace(new RegExp(search, 'gi'), replace);
      if (newText !== item.text) {
        saveUndoState();
        item.text = newText;
        item.len = new TextEncoder().encode(newText).length;
        srCurrentIndex = (idx + 1) % srResults.length;
        displayTextList();
        updateStats();
        showToast('✏️ Diganti 1', false, true);
        return;
      }
    }
  }
  showToast('Tidak ada yang bisa diganti', true);
}

function srReplaceAll() {
  const search = document.getElementById('srSearch').value;
  const replace = document.getElementById('srReplace').value;
  if (!search) { showToast('Masukkan teks', true); return; }
  
  let count = 0;
  saveUndoState();
  texts.forEach(item => {
    if (item.text.toLowerCase().includes(search.toLowerCase())) {
      const newText = item.text.replace(new RegExp(search, 'gi'), replace);
      if (newText !== item.text) {
        item.text = newText;
        item.len = new TextEncoder().encode(newText).length;
        count++;
      }
    }
  });
  
  if (count > 0) {
    displayTextList();
    updateStats();
    showToast('✏️ ' + count + ' diganti', false, true);
    document.getElementById('srStats').textContent = '✅ ' + count + ' diganti';
  } else {
    showToast('Tidak ada yang diganti', true);
  }
}

function highlightTextItem(index) {
  const items = document.querySelectorAll('.file-card');
  items.forEach((item, i) => {
    if (i === index) {
      item.style.borderColor = 'var(--text-secondary)';

      item.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      item.style.borderColor = '';
      item.style.boxShadow = '';

  }

// ========================================================================
// ===== DECODE / ENCODE =====
// ========================================================================
function decodeModifiedUTF8(bytes) {
    let result = []; let i = 0;
    while (i < bytes.length) {
        let b1 = bytes[i++];
        if (b1 < 0x80) { result.push(String.fromCharCode(b1)); }
        else if ((b1 & 0xE0) == 0xC0) { let b2 = bytes[i++]; result.push(String.fromCharCode(((b1 & 0x1F) << 6) | (b2 & 0x3F))); }
        else if ((b1 & 0xF0) == 0xE0) { let b2 = bytes[i++]; let b3 = bytes[i++]; result.push(String.fromCharCode(((b1 & 0x0F) << 12) | ((b2 & 0x3F) << 6) | (b3 & 0x3F))); }
        else if ((b1 & 0xF8) == 0xF0) { let b2 = bytes[i++]; let b3 = bytes[i++]; let b4 = bytes[i++]; let codePoint = ((b1 & 0x07) << 18) | ((b2 & 0x3F) << 12) | ((b3 & 0x3F) << 6) | (b4 & 0x3F); result.push(String.fromCodePoint(codePoint)); }
        else if (b1 == 0xC0 && i < bytes.length && bytes[i] == 0x80) { i++; result.push('\x00'); }
        else { result.push('?'); }
    }
    return result.join('');
}

function encodeModifiedUTF8(str) {
    let bytes = [];
    for (let i = 0; i < str.length; i++) {
        let code = str.charCodeAt(i);
        if (code == 0) { bytes.push(0xC0, 0x80); }
        else if (code < 0x80) { bytes.push(code); }
        else if (code < 0x800) { bytes.push(0xC0 | (code >> 6), 0x80 | (code & 0x3F)); }
        else if (code < 0xD800 || code > 0xDFFF) { bytes.push(0xE0 | (code >> 12), 0x80 | ((code >> 6) & 0x3F), 0x80 | (code & 0x3F)); }
        else { let next = str.charCodeAt(++i); let codePoint = 0x10000 + ((code & 0x3FF) << 10) | (next & 0x3FF); bytes.push(0xF0 | (codePoint >> 18), 0x80 | ((codePoint >> 12) & 0x3F), 0x80 | ((codePoint >> 6) & 0x3F), 0x80 | (codePoint & 0x3F)); }
    }
    return bytes;
}

// ========================================================================
// ===== VALIDATION =====
// ========================================================================
function isValidString(bytes) {
    for (let i = 0; i < bytes.length; i++) { if (bytes[i] < 32 && bytes[i] !== 10 && bytes[i] !== 13) return false; }
    return true;
}

function isReadableString(text) {
    if (text.length < 2) return false;
    let readableCount = 0;
    for (let i = 0; i < text.length; i++) {
        let code = text.charCodeAt(i);
        if ((code >= 32 && code <= 126) || code >= 160 || code == 0) { readableCount++; }
    }
    return (readableCount / text.length) > 0.5;
}

function isGameText(text) {
    let skipWords = ['Code', 'StackMapTable', 'LineNumberTable', 'SourceFile', 'LocalVariableTable', 'Signature', 'Deprecated', 'Synthetic', 'InnerClasses', 'EnclosingMethod', 'BootstrapMethods', 'MethodParameters', 'Module', 'ModuleMainClass', 'java/', 'javax/', 'sun/', 'com/sun/', 'org/', 'Ljava/', 'Ljavax/', 'Lsun/', 'Lcom/sun/', 'Lorg/', '()V', '()Z', '()I', '()J', '()F', '()D', 'main', 'init', 'clinit', 'this', 'super'];
    for (let sw of skipWords) { if (text.includes(sw)) return false; }
    if (/^[A-Z][a-zA-Z0-9]*$/.test(text) && text.length < 25) return false;
    if (/^[a-z][a-z0-9]*$/.test(text) && text.length < 20) return false;
    if (/^[0-9]+$/.test(text)) return false;
    if (/^[A-Z_]+$/.test(text)) return false;
    return true;
}

function isImageFile(filename) {
    const ext = filename.toLowerCase();
    return ext.endsWith('.png') || ext.endsWith('.jpg') || ext.endsWith('.jpeg') || 
           ext.endsWith('.gif') || ext.endsWith('.bmp') || ext.endsWith('.webp') ||
           ext.endsWith('.svg') || ext.endsWith('.ico');
}

function getFileIcon(filename) {
    if (filename.endsWith('.class')) return '☕';
    if (filename.endsWith('.jar') || filename.endsWith('.zip')) return '📦';
    if (isImageFile(filename)) return '🖼️';
    if (filename.endsWith('.mp3') || filename.endsWith('.wav') || filename.endsWith('.mid')) return '🎵';
    if (filename.endsWith('.txt') || filename.endsWith('.properties')) return '📝';
    if (filename.endsWith('.xml') || filename.endsWith('.json')) return '📋';
    if (filename.endsWith('.bin') || filename.endsWith('.dat')) return '💾';
    if (filename.endsWith('.html') || filename.endsWith('.htm')) return '🌐';
    if (filename.endsWith('.js') || filename.endsWith('.css')) return '🎨';
    if (filename.endsWith('.pdf')) return '📕';
    if (filename.endsWith('.doc') || filename.endsWith('.docx')) return '📘';
    return '📄';
}

// ========================================================================
// ===== DOWNLOAD JAR =====
// ========================================================================
function downloadJar(){
  if(Object.keys(extractedFiles).length === 0){
    showToast('Ekstrak JAR dulu!', true);
    return;
  }
  showLoading(true, 'Membuat JAR...', 'Mengompres file...', '📦');
  
  setTimeout(async ()=>{
    try{
      if (typeof JSZip !== 'undefined' && JSZip.loadAsync) {
        try {
          const zip = new JSZip();
          let total = Object.keys(extractedFiles).length;
          let done = 0;
          
          for (let [filename, content] of Object.entries(extractedFiles)) {
            let data = content;
            if (data._compressed && typeof JSZip !== 'undefined') {
              try {
                const tempZip = await JSZip.loadAsync(data);
                const entry = tempZip.files[Object.keys(tempZip.files)[0]];
                if (entry) data = await entry.async('uint8array');
              } catch(e) {}
            }
            zip.file(filename, data);
            done++;
            updateLoadingProgress((done / total) * 100);
            updateLoadingText('Membuat JAR...', 'File ' + done + '/' + total);
          }
          
          const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = currentArchiveName || 'modified.jar';
          link.style.display = 'none';
          document.body.appendChild(link);
          link.click();
          setTimeout(()=>{
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            showLoading(false);
            showToast('✅ JAR selesai!', false, true);
          }, 100);
          return;
        } catch(e) {
          console.log('JSZip failed, using manual', e);
        }
      }
      
      // Manual ZIP
      let zipData = [];
      let centralDir = [];
      let offset = 0;
      
      for (let [filename, content] of Object.entries(extractedFiles)) {
        let fileData = content;
        if (fileData._compressed && fileData.length < (fileData._uncompressedSize || 0)) {
          if (typeof JSZip !== 'undefined') {
            try {
              const tempZip = await JSZip.loadAsync(fileData);
              const entries = Object.keys(tempZip.files);
              if (entries.length > 0) {
                fileData = await tempZip.files[entries[0]].async('uint8array');
              }
            } catch(e) {}
          }
        }
        
        let localHeader = new Uint8Array(30);
        let view = new DataView(localHeader.buffer);
        view.setUint32(0, 0x04034b50, true);
        view.setUint16(4, 20, true);
        view.setUint16(6, 0, true);
        view.setUint16(8, 0, true);
        view.setUint32(10, 0, true);
        view.setUint32(14, fileData.length, true);
        view.setUint32(18, fileData.length, true);
        let fnBytes = new TextEncoder().encode(filename);
        view.setUint16(26, fnBytes.length, true);
        view.setUint16(28, 0, true);
        
        zipData.push(localHeader);
        zipData.push(fnBytes);
        zipData.push(fileData);
        
        let centralEntry = new Uint8Array(46);
        let cv = new DataView(centralEntry.buffer);
        cv.setUint32(0, 0x02014b50, true);
        cv.setUint16(4, 20, true);
        cv.setUint16(6, 20, true);
        cv.setUint16(8, 0, true);
        cv.setUint16(10, 0, true);
        cv.setUint32(12, 0, true);
        cv.setUint32(16, fileData.length, true);
        cv.setUint32(20, fileData.length, true);
        cv.setUint16(24, fnBytes.length, true);
        cv.setUint16(26, 0, true);
        cv.setUint16(28, 0, true);
        cv.setUint16(30, 0, true);
        cv.setUint32(38, 0, true);
        cv.setUint32(42, offset, true);
        centralDir.push(centralEntry);
        centralDir.push(fnBytes);
        offset += 30 + fnBytes.length + fileData.length;
      }
      
      let eocd = new Uint8Array(22);
      let ev = new DataView(eocd.buffer);
      ev.setUint32(0, 0x06054b50, true);
      ev.setUint16(4, 0, true);
      ev.setUint16(6, 0, true);
      ev.setUint16(8, Object.keys(extractedFiles).length, true);
      ev.setUint16(10, Object.keys(extractedFiles).length, true);
      let centralSize = 0;
      for (let entry of centralDir) { centralSize += entry.length; }
      ev.setUint32(12, centralSize, true);
      let centralOffset = offset;
      ev.setUint32(16, centralOffset, true);
      ev.setUint16(20, 0, true);
      
      let allParts = [...zipData, ...centralDir, eocd];
      let totalSize = 0;
      for (let part of allParts) { totalSize += part.length; }
      let result = new Uint8Array(totalSize);
      let pos = 0;
      for (let part of allParts) { result.set(part, pos); pos += part.length; }
      
      const blob = new Blob([result], { type: 'application/java-archive' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = currentArchiveName || 'modified.jar';
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      setTimeout(()=>{
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        showLoading(false);
        showToast('✅ JAR selesai!', false, true);
      }, 100);
    } catch(e){
      console.error(e);
      showLoading(false);
      showToast('❌ Gagal: ' + e.message, true);
    }
  }, 100);
}

// ========================================================================
// ===== PARSE CLASS FILE =====
// ========================================================================
function parseClassFile(data){
  texts = [];
  let view = new DataView(data.buffer);
  let offset = 8;
  let cpCount = view.getUint16(offset);
  offset += 2;
  for(let i=1; i<cpCount; i++){
    let tag = data[offset++];
    if(tag === 1){
      let len = view.getUint16(offset);
      offset += 2;
      let strOff = offset;
      let bytes = data.slice(strOff, strOff + len);
      try{
        let text = decodeModifiedUTF8(bytes);
        if (isReadableString(text) && isGameText(text) && text.length >= 2) {
          texts.push({ cpIndex: i, offset: strOff, len: len, text: text, originalLen: len, fileName: originalFileName, type: 'CLASS' });
        }
      }catch(e){}
      offset += len;
    }else{
      let skip = 0;
      if(tag == 3 || tag == 4) skip = 4;
      else if(tag == 5 || tag == 6) skip = 8;
      else if(tag == 7) skip = 2;
      else if(tag == 8) skip = 2;
      else if(tag == 9 || tag == 10 || tag == 11) skip = 4;
      else if(tag == 12) skip = 4;
      else if(tag == 15) skip = 3;
      else if(tag == 16) skip = 2;
      else if(tag == 18) skip = 4;
      offset += skip;
    }
  }
  displayTextList();
  if (texts.length === 0) {
    document.getElementById('fileInfo').innerHTML = `<div style="font-size:9px;color:var(--text-muted);padding:6px 12px;background:var(--bg-secondary);border-radius:10px;border-left:2px solid var(--text-secondary);margin:4px 0">Tidak ada string readable di .class!</div>`;
  } else {
    document.getElementById('fileInfo').innerHTML = `<div style="font-size:9px;color:var(--text-muted);padding:6px 12px;background:var(--bg-secondary);border-radius:10px;border-left:2px solid var(--text-secondary);margin:4px 0">${originalFileName} | ${(data.length/1024).toFixed(1)}KB | ${texts.length} string [CLASS]</div>`;
  }
  updateStats();
}

// ========================================================================
// ===== PARSE BINARY DATA =====
// ========================================================================
function parseBinaryData(data) {
  texts = [];
  let index = 0;
  while (index < data.length - 1) {
    let length = (data[index] << 8) | data[index + 1];
    if (length === 0 || index + 2 + length > data.length) { index++; continue; }
    const slice = data.slice(index + 2, index + 2 + length);
    try {
      let text = new TextDecoder('utf-8', { fatal: true }).decode(slice);
      if (isValidString(slice) && isReadableString(text) && text.length >= 2) {
        texts.push({ index, length, text, fileName: originalFileName, type: 'BIN' });
      }
      index += 2 + length;
    } catch (e) { index++; }
  }
  displayTextList();
  if (texts.length === 0) {
    document.getElementById('fileInfo').innerHTML = `<div style="font-size:9px;color:var(--text-muted);padding:6px 12px;background:var(--bg-secondary);border-radius:10px;border-left:2px solid var(--text-secondary);margin:4px 0">Tidak ada string readable!</div>`;
  } else {
    document.getElementById('fileInfo').innerHTML = `<div style="font-size:9px;color:var(--text-muted);padding:6px 12px;background:var(--bg-secondary);border-radius:10px;border-left:2px solid var(--text-secondary);margin:4px 0">${originalFileName} | ${(data.length/1024).toFixed(1)}KB | ${texts.length} string [BIN]</div>`;
  }
  updateStats();
}

// ========================================================================
// ===== EXTRACT ARCHIVE =====
// ========================================================================
async function extractArchive(file){
  try{
    showLoading(true, 'Mengekstrak ' + file.name, 'Membaca archive...', '📦');
    
    const arrayBuffer = await file.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    let zip;
    try { 
      zip = await extractZip(data); 
    } catch(e) { 
      zip = await ManualZip.loadAsync(data); 
    }
    
    extractedFiles = {}; 
    extractedFolders = {};
    let totalFiles = 0; 
    let classFiles = 0;
    
    const entries = Object.entries(zip.files);
    let processed = 0;
    
    for (let [filename, zipEntry] of entries) {
      if (zipEntry.dir) continue;
      totalFiles++;
      try {
        let content;
        if (zipEntry.async) {
          content = await zipEntry.async('uint8array');
        } else if (zipEntry._data) {
          content = zipEntry._data;
        }
        if (content) {
          extractedFiles[filename] = content;
          if(filename.endsWith('.class')) classFiles++;
          let parts = filename.split('/');
          let currentPath = '';
          for (let i = 0; i < parts.length - 1; i++) {
            if (i > 0) currentPath += '/';
            currentPath += parts[i];
            if (!extractedFolders[currentPath]) { extractedFolders[currentPath] = []; }
            if (!extractedFolders[currentPath].includes(parts[i])) { extractedFolders[currentPath].push(parts[i]); }
          }
        }
        processed++;
        updateLoadingProgress((processed / entries.length) * 100);
        updateLoadingText('Mengekstrak...', 'File ' + processed + '/' + entries.length);
      } catch(e) {
        console.log('Error:', filename, e);
      }
    }
    
    fileListArray = Object.keys(extractedFiles).sort();
    currentFileIndex = -1;
    updateFileNavigation();
    updateStats();
    
    let fileListHtml = buildFileTree(extractedFiles);
    document.getElementById('fileBrowser').style.display = 'block';
    document.getElementById('fileList').innerHTML = fileListHtml;
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
    showLoading(false);
    showToast('✅ ' + totalFiles + ' file (' + classFiles + ' .class)', false, true);
    if(classFiles > 0){
      document.getElementById('fileInfo').innerHTML = `<div style="font-size:9px;color:var(--text-muted);padding:6px 12px;background:var(--bg-secondary);border-radius:10px;border-left:2px solid var(--text-secondary);margin:4px 0">📦 ${file.name} | ${totalFiles} file | ${classFiles} .class</div>`;
      document.getElementById('fileInfo').style.display = 'block';
    }
    document.getElementById('finderFileCount').textContent = totalFiles + ' file';
    if (currentMode === 'finder') {
      document.getElementById('finderStats').textContent = '🔍 Cari di ' + totalFiles + ' file';
    }
  } catch(e){
    console.error(e);
    showLoading(false);
    showToast('❌ Gagal: ' + e.message, true);
  }
}

// ========================================================================
// ===== BUILD FILE TREE =====
// ========================================================================
function buildFileTree(files){
  let html = '';
  let folders = {}; let rootFiles = [];
  for (let [filename, content] of Object.entries(files)) {
    let parts = filename.split('/');
    if (parts.length === 1) { rootFiles.push(filename); }
    else {
      let folder = parts.slice(0, -1).join('/');
      if (!folders[folder]) folders[folder] = [];
      folders[folder].push(filename);
    }
  }
  let sortedFolders = Object.keys(folders).sort();
  for (let folder of sortedFolders) {
    let filesInFolder = folders[folder].sort();
    let folderName = folder.split('/').pop();
    html += `<div class="folder" onclick="toggleFolder(this)"><span class="icon">📁</span> ${folderName} <span style="font-size:8px;color:var(--text-muted)">(${filesInFolder.length})</span></div>`;
    html += `<div class="folder-content" id="folder_${folder.replace(/[^a-zA-Z0-9]/g, '_')}">`;
    for (let file of filesInFolder) {
      let content = extractedFiles[file];
      let icon = getFileIcon(file);
      let sizeKB = content ? (content.length / 1024).toFixed(1) : '0';
      html += `<div class="file-entry" onclick="openExtractedFile('${file.replace(/'/g, "\\'")}')">
        <span><span class="icon">${icon}</span> ${file.split('/').pop()}</span>
        <span class="size">${sizeKB}KB</span>
      </div>`;
    }
    html += `</div>`;
  }
  if (rootFiles.length > 0) {
    html += `<div class="folder" style="border-left-color:var(--text-secondary)">📁 Root <span style="font-size:8px;color:var(--text-muted)">(${rootFiles.length})</span></div>`;
    html += `<div class="folder-content open">`;
    for (let file of rootFiles.sort()) {
      let content = extractedFiles[file];
      let icon = getFileIcon(file);
      let sizeKB = content ? (content.length / 1024).toFixed(1) : '0';
      html += `<div class="file-entry" onclick="openExtractedFile('${file.replace(/'/g, "\\'")}')">
        <span><span class="icon">${icon}</span> ${file}</span>
        <span class="size">${sizeKB}KB</span>
      </div>`;
    }
    html += `</div>`;
  }
  return html;
}

function toggleFolder(el){
  let content = el.nextElementSibling;
  if (content && content.classList.contains('folder-content')) {
    content.classList.toggle('open');
    el.querySelector('.icon').textContent = content.classList.contains('open') ? '📂' : '📁';
  }
}

  closeSidebar();
  if(!extractedFiles[filename]){ showToast('File tidak ditemukan', true); return; }
  
  document.getElementById('imagePreview').style.display = 'none';
  
  let isClass = filename.endsWith('.class');
  let content = extractedFiles[filename];
  
  currentFileIndex = fileListArray.indexOf(filename);
  updateFileNavigation();
  
  if (isImageFile(filename)) {
    showImagePreview(content, filename);
    document.getElementById('searchContainer').style.display = 'none';
    document.getElementById('textList').style.display = 'none';
    document.getElementById('fileInfo').style.display = 'none';

    document.getElementById('scrollDown').style.display = 'none';
    document.getElementById('finderResults').style.display = 'none';
    showToast('🖼️ ' + filename, false);
    return;
  }
  
  if(!isClass){
    isClassFile = false; originalFileName = filename; binaryData = content;
    parseBinaryData(content);
    document.getElementById('searchContainer').style.display = 'block';
    document.getElementById('searchInput').placeholder = 'Cari teks...';
    document.getElementById('finderResults').style.display = 'none';
    document.getElementById('textList').style.display = 'block';
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('saveBtn').style.display = 'inline-flex';

    document.getElementById('scrollDown').style.display = 'inline-flex';
    if (currentMode === 'finder') switchMode('search');
    showToast('📄 ' + filename, false);
    updateStats();
    return;
  }
  isClassFile = true; originalFileName = filename; binaryData = content;
  parseClassFile(content);
  document.getElementById('searchContainer').style.display = 'block';
  document.getElementById('searchInput').placeholder = 'Cari dalam .class...';
  document.getElementById('finderResults').style.display = 'none';
  document.getElementById('textList').style.display = 'block';
  document.getElementById('fileInfo').style.display = 'block';
  document.getElementById('saveBtn').style.display = 'inline-flex';
  document.getElementById('scrollUp').style.display = 'inline-flex';
  document.getElementById('scrollDown').style.display = 'inline-flex';
  if (currentMode === 'finder') switchMode('search');
  showToast('☕ ' + filename, false);
  updateStats();
}

// ===== NAVIGATION RING =====
// ========================================================================
function updateFileNavigation() {
  const ring = document.getElementById('navRing');
  const counter = document.getElementById('navCounter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const fname = document.getElementById('navFname');
  
  if (!navVisible) return;
  
  if (fileListArray.length > 0 && currentFileIndex >= 0 && currentFileIndex < fileListArray.length) {
    ring.style.display = 'flex';
    counter.textContent = `${currentFileIndex + 1}/${fileListArray.length}`;
    prevBtn.disabled = currentFileIndex <= 0;
    nextBtn.disabled = currentFileIndex >= fileListArray.length - 1;
    const name = fileListArray[currentFileIndex];
    fname.textContent = name.length > 20 ? '...' + name.slice(-17) : name;
    fname.title = name;
  } else if (fileListArray.length > 0) {
    ring.style.display = 'flex';
    counter.textContent = `0/${fileListArray.length}`;
    prevBtn.disabled = true;
    nextBtn.disabled = false;
    fname.textContent = 'Pilih';
  } else {
    ring.style.display = 'none';
  }
}

function navigateFile(direction) {
  const total = fileListArray.length;
  if (total === 0) return;
  
  if (currentFileIndex === -1) {
    currentFileIndex = direction > 0 ? 0 : total - 1;
  } else {
    currentFileIndex += direction;
    if (currentFileIndex < 0) currentFileIndex = total - 1;
    if (currentFileIndex >= total) currentFileIndex = 0;
  }
  
  const filename = fileListArray[currentFileIndex];
  if (filename) openExtractedFile(filename);
}

function hideNavRing() {
  if (!navVisible) return;
  navVisible = false;
  document.getElementById('navRing').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('showNavBtn').classList.add('visible');

  document.getElementById('popupTitle').textContent = 'Tampilkan Navigasi?';
