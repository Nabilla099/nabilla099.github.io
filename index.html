// ========================================================================
// ===== DRAGGABLE NAV RING =====
// ========================================================================
(function initDraggable() {
  const ring = document.getElementById('navRing');
  const dot = document.getElementById('dragDot');
  let startX, startY, startLeft, startBottom;
  
  function getPos(e) {
    if (e.touches) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }
  
  function startDrag(e) {
    if (!dot.contains(e.target)) return;
    e.preventDefault();
    const pos = getPos(e);
    const rect = ring.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    
    startX = pos.x;
    startY = pos.y;
    startLeft = rect.left;
    startBottom = vh - rect.bottom;
    isDragging = true;
    ring.style.transition = 'none';
  }
  
  function moveDrag(e) {
    if (!isDragging) return;
    e.preventDefault();
    const pos = getPos(e);
    const dx = pos.x - startX;
    const dy = pos.y - startY;
    
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const rect = ring.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    
    let newLeft = Math.max(0, Math.min(vw - w, startLeft + dx));
    let newBottom = Math.max(0, Math.min(vh - h - 10, startBottom - dy));
    
    ring.style.left = newLeft + 'px';
    ring.style.bottom = newBottom + 'px';
    ring.style.transform = 'none';
  }
  
  function endDrag(e) {
    if (isDragging) {
      isDragging = false;
      ring.style.transition = '';
    }
  }
  
  dot.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('mouseup', endDrag);
  
  dot.addEventListener('touchstart', startDrag, { passive: false });
  document.addEventListener('touchmove', moveDrag, { passive: false });
  document.addEventListener('touchend', endDrag);
  
  ring.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('mousedown', e => e.stopPropagation());
    btn.addEventListener('touchstart', e => e.stopPropagation());
  });
})();

// ========================================================================
// ===== SPLIT STRING =====
// ========================================================================
function splitString(idx, delimiter) {
  const text = texts[idx].text;
  let parts = [];
  if (delimiter === 'auto') {
    parts = text.split(/(?=;say)/);
    if (parts.length <= 1) parts = text.split(/(?=;)/);
    if (parts.length <= 1) parts = text.split(/(?<=[.!?])/);
    if (parts.length <= 1) { showToast('Tidak bisa split', true); return; }
  } else {
    parts = text.split(delimiter);
  }
  parts = parts.filter(p => p.trim().length > 0);
  if (parts.length <= 1) { showToast('Tidak ada bagian', true); return; }
  let newText = parts.join('\n');
  texts[idx].text = newText;
  texts[idx].len = new TextEncoder().encode(newText).length;
  displayTextList();
  showToast('✅ Split jadi ' + parts.length, false, true);
}

function manualSplit(idx) {
  let delimiter = prompt('Masukkan delimiter (; atau . atau ,)', ';');
  if (delimiter === null) return;
  if (delimiter === '') { showToast('Delimiter tidak boleh kosong', true); return; }
  splitString(idx, delimiter);
}

// ========================================================================
// ===== DISPLAY TEXT LIST =====
// ========================================================================
function displayTextList() {
  const container = document.getElementById("textList");
  container.innerHTML = "";
  texts.forEach((item, idx) => {
    const div = document.createElement("div");
    div.className = "file-card";
    div.id = "file-card-"+idx;
    let displayText = item.text.replace(/\x00/g, '␀');
    if (displayText.length > 150) displayText = displayText.slice(0, 147) + '...';
    let byteLen = 0;
    if (isClassFile) { byteLen = encodeModifiedUTF8(item.text).length; } else { byteLen = new TextEncoder().encode(item.text).length; }
    let tagClass = byteLen > item.len ? 'tag over' : 'tag';
    let icon = isClassFile ? '☕' : '📄';
    let lines = item.text.split('\n').length;
    let lineInfo = lines > 1 ? ` (${lines})` : '';
    div.innerHTML = `
      <span class="idx">${icon} ${idx+1}</span>
      <span class="txt">${displayText}</span>
      <span class="${tagClass}">${byteLen}/${item.len}${lineInfo}</span>
      <div class="act">
        <button onclick="event.stopPropagation();toggleEdit(${idx})" title="Edit">✏️</button>
      </div>
      <div class="edit-area">
        <textarea id="edit-${idx}">${item.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
        <div class="edit-btns">
          <button onclick="saveInlineEdit(${idx})">💾</button>
          <button class="cancel" onclick="cancelInlineEdit(${idx})">✕</button>
          <button class="split" onclick="splitString(${idx}, 'auto')">✂️ Auto</button>
          <button class="split" onclick="manualSplit(${idx})">✂️ Manual</button>
        </div>
      </div>
    `;
    div.addEventListener('click', function(e) {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
      toggleEdit(idx);
    });
    container.appendChild(div);
  });
  updateStats();
}

function toggleEdit(idx) {
  const item = document.getElementById('file-card-'+idx);
  if (!item) return;
  item.classList.toggle('editing');
  if (item.classList.contains('editing')) {
    const textarea = document.getElementById('edit-'+idx);
    if (textarea) { textarea.focus(); textarea.select(); }
  }
}

function saveInlineEdit(idx) {
  const textarea = document.getElementById('edit-'+idx);
  if (!textarea) return;
  const newText = textarea.value;
  if (newText !== texts[idx].text) {
    saveUndoState();
    texts[idx].text = newText;
    texts[idx].len = new TextEncoder().encode(newText).length;
    showToast('✅ Teks '+(idx+1)+' diupdate', false, true);
  }
  const item = document.getElementById('file-card-'+idx);
  if (item) item.classList.remove('editing');
  displayTextList();
  updateStats();
}

function cancelInlineEdit(idx) {
  const item = document.getElementById('file-card-'+idx);
  if (item) item.classList.remove('editing');
}

// ========================================================================
// ===== FILTER TEXT LIST =====
// ========================================================================
function filterTextList() {
  const keyword = document.getElementById("searchInput").value.toLowerCase();
  const items = document.querySelectorAll(".file-card");
  let found = 0;
  items.forEach(item => {
    const content = item.textContent.toLowerCase();
    const show = content.includes(keyword);
    item.style.display = show ? "flex" : "none";
    if (show) found++;
  });
  document.getElementById('statStrings').textContent = found + '/' + texts.length;
}

// ========================================================================
// ===== FIND IN ALL FILES =====
// ========================================================================
function findInAllFiles(keyword){
  if(!keyword || keyword.length < 2){
    document.getElementById('finderList').innerHTML = '<div style="padding:16px;text-align:center;font-size:10px;color:var(--text-muted)">💖 Minimal 2 karakter</div>';
    document.getElementById('finderStats').textContent = '🔍 Cari di semua file';
    return;
  }
  
  if(Object.keys(extractedFiles).length === 0){
    document.getElementById('finderList').innerHTML = '<div style="padding:16px;text-align:center;font-size:10px;color:var(--text-muted)">📦 Ekstrak dulu ya!</div>';
    document.getElementById('finderStats').textContent = '⚠️ Tidak ada file';
    return;
  }
  
  let results = [];
  let totalMatches = 0;
  const keywordLower = keyword.toLowerCase();
  const keywordRegex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  let fileCount = 0;
  
  for (let [filename, content] of Object.entries(extractedFiles)) {
    if(content.length > 5 * 1024 * 1024) continue;
    fileCount++;
    try{
      let text = new TextDecoder('utf-8', { fatal: false }).decode(content);
      if(text.toLowerCase().includes(keywordLower)){
        let lines = text.split('\n');
        let matches = [];
        for(let i=0; i<lines.length; i++){
          let line = lines[i];
          if(line.toLowerCase().includes(keywordLower)){
            let lineText = line.trim();
            let highlighted = lineText.replace(keywordRegex, match => `🔍${match}🔍`);
            if(highlighted.length > 200) highlighted = highlighted.slice(0, 197) + '...';
            matches.push({ line: i+1, text: highlighted });
          }
        }
        if(matches.length > 0){
          results.push({ file: filename, matches: matches, total: matches.length });
          totalMatches += matches.length;
        }
      }
    } catch(e){}
  }
  
  let html = '';
  if(results.length === 0){
    html = `<div style="padding:16px;text-align:center;font-size:10px;color:var(--text-muted)">💖 Tidak ditemukan "${keyword}" di ${fileCount} file</div>`;
  } else {
    results.sort((a, b) => b.total - a.total);
    for(let r of results){
      let icon = getFileIcon(r.file);
      let preview = r.matches.slice(0, 5).map(m => 
        `<div class="fr-preview">Line ${m.line}: ${m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
      ).join('');
      if(r.matches.length > 5) preview += `<div class="fr-preview" style="opacity:0.5">... +${r.matches.length-5}</div>`;
      html += `<div class="finder-result" onclick="openExtractedFile('${r.file.replace(/'/g, "\\'")}')">
        <div class="fr-head">
          <span>${icon}</span>
          <span>${r.file}</span>
          <span class="fc">${r.total}</span>
        </div>
        ${preview}
      </div>`;
    }
  }
  
  document.getElementById('finderList').innerHTML = html;
  document.getElementById('finderStats').textContent = '🔍 ' + totalMatches + ' hasil di ' + results.length + ' file dari ' + fileCount;
}

// ========================================================================
// ===== SAVE FILE =====
// ========================================================================
function saveFile() {
  if(!binaryData){ showToast('Load file dulu', true); return; }
  if(isClassFile){ saveClassFile(); } else { saveBinFile(); }
}

function saveClassFile(){
  showLoading(true, 'Menyimpan .class...', 'Memproses...', '💾');
  document.getElementById('saveBtn').disabled = true;
  setTimeout(()=>{
    try{
      let deltaMap = {}; let totalDelta = 0;
      for(let i=0; i<texts.length; i++){
        let newBytes = encodeModifiedUTF8(texts[i].text);
        let delta = newBytes.length - texts[i].len;
        deltaMap[texts[i].cpIndex] = delta;
        totalDelta += delta;
      }
      let newSize = binaryData.length + totalDelta;
      let result = new Uint8Array(newSize);
      let view = new DataView(result.buffer);
      result.set(binaryData.slice(0, 8), 0);
      let writePos = 8; let readPos = 8;
      let cpCount = new DataView(binaryData.buffer).getUint16(8);
      view.setUint16(8, cpCount);
      writePos = 10; readPos = 10;
      for(let i=1; i<cpCount; i++){
        let tag = binaryData[readPos++];
        result[writePos++] = tag;
        if(tag === 1){
          let oldLen = new DataView(binaryData.buffer).getUint16(readPos);
          readPos += 2;
          let delta = deltaMap[i] || 0;
          let newLen = oldLen + delta;
          view.setUint16(writePos, newLen);
          writePos += 2;
          let textEntry = texts.find(t => t.cpIndex === i);
          if(textEntry && delta !== 0){
            let encoded = encodeModifiedUTF8(textEntry.text);
            result.set(encoded, writePos);
            writePos += encoded.length;
          } else {
            let bytes = binaryData.slice(readPos, readPos + oldLen);
            result.set(bytes, writePos);
            writePos += oldLen;
          }
          readPos += oldLen;
        } else {
          let skip = 0;
          if(tag == 3 || tag == 4) skip = 4;
          else if(tag == 5 || tag == 6) skip = 8;
          else if(tag == 7) skip = 2;
          else if(tag == 8) skip = 2;
          else if(tag == 9 || tag == 10 || tag == 11) skip = 4;
          else if(tag == 12) skip = 4;
          else if(tag == 15) skip = 3;
          else if(tag == 16) skip = 2;
          else if(tag == 18) skip = 4;
          let bytes = binaryData.slice(readPos, readPos + skip);
          result.set(bytes, writePos);
          writePos += skip;
          readPos += skip;
        }
      }
      if(readPos < binaryData.length){ result.set(binaryData.slice(readPos), writePos); }
      downloadFile(result);
      let msg = originalFileName + ' ✅';
      showToast(msg, false, true);
    }catch(err){
      console.error(err);
      showToast('❌ ' + err.message, true);
      showLoading(false);
      document.getElementById('saveBtn').disabled = false;
    }
  }, 50);
}

function saveBinFile(){
  showLoading(true, 'Menyimpan...', 'Memproses...', '💾');
  document.getElementById('saveBtn').disabled = true;
  setTimeout(()=>{
    try{
      let result = []; let lastPos = 0;
      texts.forEach(({ index, length, text }) => {
        while (lastPos < index) { result.push(binaryData[lastPos++]); }
        const encoded = new TextEncoder().encode(text);
        const len = encoded.length;
        result.push((len >> 8) & 0xff); result.push(len & 0xff); result.push(...encoded);
        lastPos = index + 2 + length;
      });
      while (lastPos < binaryData.length) { result.push(binaryData[lastPos++]); }
      const newData = new Uint8Array(result);
      downloadFile(newData);
      showToast(originalFileName + ' ✅', false, true);
    }catch(err){
      showToast('❌ ' + err.message, true);
      showLoading(false);
      document.getElementById('saveBtn').disabled = false;
    }
  }, 50);
}

function downloadFile(data){
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = originalFileName;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  setTimeout(()=>{
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    showLoading(false);
    document.getElementById('saveBtn').disabled = false;
  }, 100);
}

// ========================================================================
// ===== KEYBOARD SHORTCUTS =====
// ========================================================================
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.key === 'z' && !e.shiftKey){ e.preventDefault(); undo(); }
  if((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && e.key === 'Z')){ e.preventDefault(); redo(); }
  if(e.ctrlKey && e.key === 'f'){ e.preventDefault(); openFinder(); }
  if(e.key === 'Escape'){
    if(document.getElementById('sidebar').classList.contains('open')) closeSidebar();
    if(document.getElementById('popupOverlay').classList.contains('active')) closePopup();
    closeSR();
  }
  if(e.ctrlKey && e.key === 's'){ e.preventDefault(); if(document.getElementById('saveBtn').style.display !== 'none') saveFile(); }
  if((e.altKey || e.metaKey) && e.key === 'ArrowLeft'){ e.preventDefault(); navigateFile(-1); }
  if((e.altKey || e.metaKey) && e.key === 'ArrowRight'){ e.preventDefault(); navigateFile(1); }
  if(e.ctrlKey && e.key === 'h'){ e.preventDefault(); toggleSR(); }
});
